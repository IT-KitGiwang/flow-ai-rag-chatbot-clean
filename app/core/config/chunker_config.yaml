# ----------------------------------------------------------
# HIERARCHICAL CHUNKER — Cấu trúc heading
# ----------------------------------------------------------
hierarchical_chunker:
  min_parent_tokens: 100
  max_parent_tokens: 2000
  min_child_tokens: 50
  max_child_tokens: 500
  overlap_tokens: 100
  chars_per_token: 3.5
  merge_threshold_tokens: 20
  max_heading_depth: 4
  context_prefix: true
