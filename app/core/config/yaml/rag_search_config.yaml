# ============================================================
# RAG SEARCH CONFIG — Web-Augmented RAG Pipeline
# ============================================================

# ----------------------------------------------------------
# SINH TRUY VẤN PR (Dành cho PROCEED_RAG_PR_SEARCH)
# ----------------------------------------------------------
pr_query:
  enabled: true
  provider: "openrouter"
  model: "google/gemini-2.0-flash-001"    # Đổi sang bản siêu tốc, ổn định
  temperature: 0.4
  max_tokens: 80
  timeout_seconds: 10
  # system_prompt → Đã chuyển sang app/core/prompts/prompts.yaml (domain: pr_query_node)

# ----------------------------------------------------------
# SINH TRUY VẤN NỘI BỘ UFM (Dành cho PROCEED_RAG_UFM_SEARCH)
# ----------------------------------------------------------
ufm_query:
  enabled: true
  provider: "openrouter"
  model: "google/gemini-2.0-flash-001"
  temperature: 0.2
  max_tokens: 150                    # Tăng token để đủ sinh 3 câu
  timeout_seconds: 10
  # system_prompt → Đã chuyển sang app/core/prompts/prompts.yaml (domain: ufm_query_node)

# ----------------------------------------------------------
# TÌM KIẾM WEB (gpt-4o-mini-search-preview qua OpenRouter)
# ----------------------------------------------------------
web_search:
  enabled: true
  provider: "openrouter"
  model: "openai/gpt-4o-mini-search-preview"
  temperature: 0.2
  max_tokens: 400                    # Phải đủ chỗ cho nội dung + URL trích dẫn
  timeout_seconds: 20
  # system_prompt → Đã chuyển sang app/core/prompts/prompts.yaml (domain: web_search_node)

  ufm_domains:
    - "ufm.edu.vn"
    - "tuyensinh.ufm.edu.vn"
    - "nhaphoc.ufm.edu.vn"
    - "lms.ufm.edu.vn"
    - "uis.ufm.edu.vn"
    - "pdt.ufm.edu.vn"
    - "phongcongtacsinhvien.ufm.edu.vn"
    - "thuvien.ufm.edu.vn"
    - "daotaosdh.ufm.edu.vn"
    - "isfm.ufm.edu.vn"
    - "ice.ufm.edu.vn"
    - "ufm-elearning.edu.vn"
    - "jfm.ufm.edu.vn"
    - "jfm.edu.vn"
    - "kytucxa.ufm.edu.vn"

  pr_domains:
    - "thanhnien.vn"
    - "vnexpress.net"
    - "tuoitre.vn"
    - "dantri.com.vn"
    - "giaoducthoidai.vn"

# ----------------------------------------------------------
# TỔNG HỢP NGỮ CẢNH THÔNG TIN (Bơm vào LLM chính)
# Dùng cho PROCEED_RAG_UFM_SEARCH
# ----------------------------------------------------------
info_synthesizer:
  provider: "openrouter"
  model: "google/gemini-2.0-flash-001"
  temperature: 0.1
  max_tokens: 400
  timeout_seconds: 15
  # system_prompt → Đã chuyển sang app/core/prompts/prompts.yaml (domain: info_synthesizer)

# ----------------------------------------------------------
# TỔNG HỢP NGỮ CẢNH PR (Bơm vào LLM chính)
# Dùng cho PROCEED_RAG_PR_SEARCH
# ----------------------------------------------------------
pr_synthesizer:
  provider: "openrouter"
  model: "google/gemini-2.0-flash-001"
  temperature: 0.3
  max_tokens: 400
  timeout_seconds: 15
  # system_prompt → Đã chuyển sang app/core/prompts/prompts.yaml (domain: pr_synthesizer)

# ----------------------------------------------------------
# KIỂM DUYỆT CHẤT LƯỢNG (Gác Cổng)
# ----------------------------------------------------------
sanitizer:
  provider: "openrouter"
  model: "google/gemini-2.0-flash-001"
  temperature: 0.0
  max_tokens: 150
  timeout_seconds: 10
  max_loops: 1
  # system_prompt → Đã chuyển sang app/core/prompts/prompts.yaml (domain: sanitizer_node)

# ----------------------------------------------------------
# ĐÁNH GIÁ NGỮ CẢNH (Self-RAG Evaluator / Context Gate)
# Gác cổng quyết định: DB đã đủ thông tin → bỏ qua Web Search
# ----------------------------------------------------------
context_evaluator:
  enabled: true
  provider: "openrouter"
  model: "google/gemini-3.0-flash-preview"   # Model siêu nhẹ, phán đoán YES/NO
  temperature: 0.0                           # Tuyệt đối tất định
  max_tokens: 10                             # Chỉ cần nhả "YES" hoặc "NO"
  timeout_seconds: 5                         # Nhanh gọn, không chờ lâu
  # system_prompt → app/core/prompts/prompts.yaml (domain: context_evaluator)

# ----------------------------------------------------------
# BỘ NHỚ ĐỆM TÌM KIẾM (Semantic Cache)
# ----------------------------------------------------------
search_cache:
  enabled: false                     # TẠM TẮT — BGE-M3 trên OpenRouter không ổn định
  similarity_threshold: 0.9
  ttl_hours: 24
  max_entries: 200
