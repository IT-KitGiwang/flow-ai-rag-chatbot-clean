# ╔══════════════════════════════════════════════════════════════╗
# ║  MODELS CONFIG — Toàn bộ Model AI theo thứ tự Pipeline       ║
# ║  File: app/core/config/yaml/models_config.yaml              ║
# ║  KHÔNG chứa API key — an toàn để commit lên Git             ║
# ╚══════════════════════════════════════════════════════════════╝
#
# ┌─────────────────────────────────────────────────────────────┐
# │  PIPELINE: User Query → Response                           │
# │                                                             │
# │  ❶ Fast Scan (regex, $0)            ❷ Long Query Summarizer│
# │  ❸ Context Node (reformulate)       ❹ Contextual Guard     │
# │  ❺ Intent Classification            ❻ Multi-Query          │
# │  ❼ Embedding (BGE-M3)               ❽ RAG + Context Curator│
# │  ❾ Proceed RAG Search (Web)         ❿ Care / Form Agents   │
# │  ⓫ Response Node (Main Bot)                                │
# └─────────────────────────────────────────────────────────────┘


# ══════════════════════════════════════════════════════════════
# ❷ LONG QUERY SUMMARIZER — Nén query dài (>= 1500 chars)
# ══════════════════════════════════════════════════════════════
long_query_summarizer:
  provider: "openrouter"
  model: "google/gemini-2.5-flash-lite"
  temperature: 0.0
  max_tokens: 500
  timeout_seconds: 13
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"


# ══════════════════════════════════════════════════════════════
# ❹ FAST SCAN — Guard Layer 2a (Llama 86M, Groq ~100ms)
# ══════════════════════════════════════════════════════════════
prompt_guard_fast:
  provider: "groq"
  model: "meta-llama/llama-prompt-guard-2-86m"
  max_tokens_per_chunk: 512
  score_threshold: 0.88
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"


# ══════════════════════════════════════════════════════════════
# ❸ CONTEXT NODE — Query Reformulation
# ══════════════════════════════════════════════════════════════
query_reformulation:
  provider: "openrouter"
  model: "google/gemini-2.0-flash-001"
  temperature: 0.1
  max_tokens: 500
  timeout_seconds: 8
  skip_if_no_history: true
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"

auto_summarize:
  provider: "openrouter"
  model: "google/gemini-2.5-flash"
  max_tokens: 440
  timeout_seconds: 8


# ══════════════════════════════════════════════════════════════
# ❹ CONTEXTUAL GUARD — Guard Layer 2b (Gemini Flash)
# ══════════════════════════════════════════════════════════════
prompt_guard_deep:
  provider: "openrouter"
  model: "google/gemini-2.0-flash-001"
  temperature: 0.0
  response_format: "json_object"
  fallbacks: []


# ══════════════════════════════════════════════════════════════
# ❻ MULTI-QUERY — Sinh biến thể câu hỏi (tăng recall)
# ══════════════════════════════════════════════════════════════
multi_query:
  provider: "openrouter"
  model: "google/gemini-2.5-flash-lite"
  temperature: 0.4
  max_tokens: 380
  timeout_seconds: 8
  num_variants: 3
  merge_strategy: "rrf"
  top_k_per_query: 5
  top_k_final: 7
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"


# ══════════════════════════════════════════════════════════════
# ❼ EMBEDDING — BGE-M3 Multilingual (1024D)
# ══════════════════════════════════════════════════════════════
embedding:
  provider: "openrouter"
  model: "baai/bge-m3"
  dimensions: 1024
  batch_size: 4
  fallbacks: []


# ══════════════════════════════════════════════════════════════
# ❺ INTENT CLASSIFICATION
# ══════════════════════════════════════════════════════════════

# Vector Router (fast ~50ms)
vector_router:
  provider: "openrouter"
  model: "baai/bge-m3"
  dimensions: 1024
  similarity_threshold: 0.85

# LLM Semantic Router (deep ~1-2s, khi vector score < threshold)
semantic_router:
  provider: "openrouter"
  model: "google/gemini-2.5-flash"
  temperature: 0.0
  response_format: "json_object"
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"


# ══════════════════════════════════════════════════════════════
# ❽ CONTEXT CURATOR — Gemini 2.5 Flash lọc ngữ cảnh RAG
#    Chạy sau RAG Node, giữ tối đa info hữu ích, bỏ noise
# ══════════════════════════════════════════════════════════════
context_evaluator:
  enabled: true
  provider: "openrouter"
  model: "google/gemini-2.5-flash"
  temperature: 0.0
  max_tokens: 4000
  timeout_seconds: 8
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"


# ══════════════════════════════════════════════════════════════
# ❾ PROCEED RAG SEARCH — Web-Augmented RAG Pipeline
#    enabled: false → Chỉ dùng DB nội bộ, bỏ qua Web Search
# ══════════════════════════════════════════════════════════════
proceed_rag_search:
  enabled: true

# PR Query Generator
pr_query:
  provider: "openrouter"
  model: "google/gemini-2.5-flash"
  temperature: 0.4
  max_tokens: 350
  timeout_seconds: 10
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"

# UFM Query Generator
ufm_query:
  provider: "openrouter"
  model: "google/gemini-2.5-flash"
  temperature: 0.2
  max_tokens: 350
  timeout_seconds: 10
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"

# Web Search (Google native + google_search grounding)
web_search:
  enabled: true
  provider: "google"
  model: "gemini-2.5-flash"
  temperature: 0.1
  max_tokens: 1500
  timeout_seconds: 20
  ufm_domains:
    - "ufm.edu.vn"
    - "tuyensinh.ufm.edu.vn"
    - "nhaphoc.ufm.edu.vn"
    - "uis.ufm.edu.vn"
    - "pdt.ufm.edu.vn"
    - "phongcongtacsinhvien.ufm.edu.vn"
    - "thuvien.ufm.edu.vn"
    - "daotaosdh.ufm.edu.vn"
    - "isfm.ufm.edu.vn"
    - "ice.ufm.edu.vn"
    - "ufm-elearning.edu.vn"
    - "jfm.ufm.edu.vn"
    - "jfm.edu.vn"
    - "kytucxa.ufm.edu.vn"
  pr_domains:
    - "thanhnien.vn"
    - "vnexpress.net"
    - "tuoitre.vn"
    - "dantri.com.vn"
    - "giaoducthoidai.vn"
  fallbacks:
    - provider: "openrouter"
      model: "openai/gpt-4o-search-preview"
    - provider: "openrouter"
      model: "perplexity/sonar"

# Info Synthesizer (UFM Search)
info_synthesizer:
  provider: "openrouter"
  model: "google/gemini-2.5-flash"
  temperature: 0.0
  max_tokens: 1500
  timeout_seconds: 15
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"

# PR Synthesizer (PR Search)
pr_synthesizer:
  provider: "openrouter"
  model: "google/gemini-2.5-flash"
  temperature: 0.1
  max_tokens: 1500
  timeout_seconds: 15
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"

# Sanitizer (kiểm duyệt bản nháp)
sanitizer:
  provider: "openrouter"
  model: "google/gemini-2.5-flash"
  temperature: 0.0
  max_tokens: 500
  timeout_seconds: 10
  max_loops: 1
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"

# Semantic Search Cache
search_cache:
  enabled: true
  similarity_threshold: 0.80
  ttl_hours: 24
  max_entries: 200


# ══════════════════════════════════════════════════════════════
# ❿ CARE NODE — Chăm sóc sinh viên (đồng cảm + liên hệ)
# ══════════════════════════════════════════════════════════════
care:
  provider: "openrouter"
  model: "qwen/qwen3.5-flash-02-23"
  temperature: 0.5
  max_tokens: 1000
  timeout_seconds: 15
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"


# ══════════════════════════════════════════════════════════════
# ❿ FORM NODE — Trích xuất thông tin & soạn mẫu đơn
# ══════════════════════════════════════════════════════════════
form:
  provider: "openrouter"
  extractor:
    model: "qwen/qwen3-30b-a3b"
    temperature: 0.0
    max_tokens: 900
    timeout_seconds: 10
  drafter:
    model: "qwen/qwen3-30b-a3b"
    temperature: 0.3
    max_tokens: 5000
    timeout_seconds: 15
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"


# ══════════════════════════════════════════════════════════════
# ⓫ MAIN BOT — LLM phản hồi chính (node cuối cùng)
# ══════════════════════════════════════════════════════════════
main_bot:
  enabled: true
  provider: "openrouter"
  model: "google/gemini-2.5-flash"
  temperature: 0.4
  max_tokens: 9000
  timeout_seconds: 24
  fallbacks:
    - provider: "openrouter"
      model: "meta-llama/llama-3.1-70b-instruct"
    - provider: "openrouter"
      model: "qwen/qwen-2.5-72b-instruct"


# ══════════════════════════════════════════════════════════════
# ⚙️ FALLBACK SETTINGS
# ══════════════════════════════════════════════════════════════
fallback_settings:
  max_retries: 2
  retry_delay_ms: 500
  log_fallback: true
