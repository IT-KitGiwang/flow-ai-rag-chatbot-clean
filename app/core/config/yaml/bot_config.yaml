# ============================================================
# MAIN BOT CONFIG (Non-sensitive settings)
# File này CHỈ chứa config cho BOT CHÍNH (Layer 4 - RAG/LLM)
# KHÔNG chứa API key - an toàn để commit lên Git
# ============================================================

# ----------------------------------------------------------
# LỚP 4: Main Bot (RAG / LLM Generation)
# Đổi provider + model tại đây để switch dịch vụ
# ----------------------------------------------------------
main_bot:
  enabled: true
  provider: "openrouter"                        # Cấp nguồn: OpenRouter
  model: "google/gemini-3.0-flash-preview"      # Model thế hệ mới nhất, suy luận context sâu
  temperature: 0.2                              # Tăng nhẹ để văn phong tự nhiên, mượt mà
  max_tokens: 1500                              # Cho phép bot trả lời dài hơn
  timeout_seconds: 20                           # Timeout cho sinh context dài
