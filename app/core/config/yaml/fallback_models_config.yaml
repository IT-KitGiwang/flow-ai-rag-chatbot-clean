# ============================================================
# FALLBACK MODELS CONFIG — Danh sách model dự phòng (có provider)
# ============================================================

# ----------------------------------------------------------
# NHÓM 1: LIGHT — Sinh text ngắn (Query Gen, Reformulation)
# ----------------------------------------------------------
light_models:
  primary:
    provider: "openrouter"
    model: "google/gemini-2.0-flash-001"
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"

# ----------------------------------------------------------
# NHÓM 2: MEDIUM — Tổng hợp ngữ cảnh (Synthesizer, Sanitizer)
# ----------------------------------------------------------
medium_models:
  primary:
    provider: "openrouter"
    model: "google/gemini-2.0-flash-001"
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"

# ----------------------------------------------------------
# NHÓM 3: SEARCH — Crawl web thực tế
# ----------------------------------------------------------
search_models:
  primary:
    provider: "openrouter"
    model: "openai/gpt-4o-mini-search-preview"
  fallbacks:
    - provider: "openrouter"
      model: "perplexity/sonar"
    - provider: "openrouter"
      model: "openai/gpt-4o-search-preview"

# ----------------------------------------------------------
# NHÓM 4: EMBEDDING — Nhúng text thành vector
# ----------------------------------------------------------
embedding_models:
  primary:
    provider: "openrouter"
    model: "baai/bge-m3"
  fallbacks: []

# ----------------------------------------------------------
# NHÓM 5: GUARD — Phát hiện prompt injection
# ----------------------------------------------------------
guard_models:
  primary:
    provider: "openrouter"
    model: "meta-llama/llama-prompt-guard-2-86m"
  fallbacks:
    - provider: "openrouter"
      model: "qwen/qwen-2.5-7b-instruct"

# ----------------------------------------------------------
# NHÓM 6: MAIN BOT — LLM chính trả lời người dùng
# ----------------------------------------------------------
main_bot_models:
  primary:
    provider: "openrouter"
    model: "meta-llama/llama-3.1-70b-instruct"
  fallbacks:
    - provider: "openrouter"
      model: "google/gemini-2.0-flash-001"
    - provider: "openrouter"
      model: "qwen/qwen-2.5-72b-instruct"

# ----------------------------------------------------------
# CẤU HÌNH FALLBACK CHUNG
# ----------------------------------------------------------
fallback_settings:
  max_retries: 2
  retry_delay_ms: 500
  log_fallback: true
