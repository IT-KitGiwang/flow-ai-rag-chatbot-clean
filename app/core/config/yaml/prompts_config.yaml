# 🔴 FALLBACK MESSAGES — Tin nhắn trả thẳng (không gọi LLM)
# ⚠️ Hotline/contact info được Python tự gắn vào cuối — KHÔNG hardcode ở đây
fallback_messages:
  # Layer 0: Input quá dài
  too_long: |
    Kính chào bạn,
    Cảm ơn bạn đã đặt câu hỏi. Tuy nhiên, nội dung câu hỏi hiện tại khá dài (vượt quá 3000 ký tự), nên có thể gây khó khăn trong việc xử lý và phản hồi một cách chính xác nhất.
    Bạn vui lòng tóm tắt lại những ý chính hoặc câu hỏi trọng tâm để mình có thể hỗ trợ bạn nhanh chóng và hiệu quả hơn nhé.

  # ============================
  # KHO TIN NHẮN CHUNG
  # ============================
  common_rejection: &COMMON_REJECTION |
    Kính chào bạn,
    Xin lỗi vì sự bất tiện, nhưng yêu cầu của bạn có dấu hiệu không phù hợp hoặc nằm ngoài phạm vi hỗ trợ của hệ thống tư vấn tuyển sinh.
    Để đảm bảo tính chính xác và an toàn thông tin, mình không thể xử lý nội dung này. Hệ thống chỉ hỗ trợ các câu hỏi liên quan đến ngành học, học phí, cũng như phương thức và điều kiện xét tuyển tại Trường Đại học Tài chính – Marketing (UFM).
    Bạn vui lòng điều chỉnh hoặc đặt lại câu hỏi phù hợp để mình có thể hỗ trợ bạn một cách nhanh chóng và hiệu quả hơn.
    Ngoài ra, dưới đây là một số thông tin liên hệ của Trường Đại học Tài chính – Marketing (UFM) để bạn tham khảo thêm khi cần:

  # ----------------------------
  # CÁC NODE KẾ THỪA TIN NHẮN
  # ----------------------------
  # Layer 1a: Từ khóa nhạy cảm
  banned_content: *COMMON_REJECTION

  # Layer 1b: Injection/Jailbreak
  injection: *COMMON_REJECTION

  # Layer 2a: Llama Guard score cao
  guard_fast_unsafe: *COMMON_REJECTION

  # Layer 2b: Qwen Deep phát hiện UNSAFE
  guard_deep_unsafe: *COMMON_REJECTION

  # Intent Nhóm 4: Block Fallback Messages
  cau_hoi_lac_de: *COMMON_REJECTION
  tan_cong_he_thong: *COMMON_REJECTION
  out_of_scope: *COMMON_REJECTION

  # ----------------------------
  # TIN NHẮN NGOẠI LỆ (Đặc thù)
  # ----------------------------
  boi_nho_doi_thu: >
    UFM luôn tôn trọng tất cả các cơ sở giáo dục. Mỗi trường đều có thế mạnh riêng,
    mình không thể đưa ra nhận xét so sánh mang tính hạ thấp.
    Bạn muốn tìm hiểu về điểm mạnh của UFM không? Mình rất vui được giới thiệu!

  doi_hoi_cam_ket: >
    Cơ hội nghề nghiệp phụ thuộc vào năng lực và sự nỗ lực của bạn.
    Mình không thể cam kết tuyệt đối, nhưng chương trình UFM luôn sát nhu cầu doanh nghiệp.
    Bạn muốn tìm hiểu chương trình đào tạo cụ thể của ngành nào?


