version: '3.8'

services:
  # ==========================================================
  # CƠ SỞ DỮ LIỆU POSTGRESQL + PGVECTOR
  # Hình ảnh tối ưu hóa cho Vector Search
  # ==========================================================
  postgres_vector:
    image: pgvector/pgvector:pg16
    container_name: ufm_pgvector
    restart: always
    environment:
      - POSTGRES_USER=ufm_admin
      - POSTGRES_PASSWORD=ufm_secure_password_2026
      - POSTGRES_DB=ufm_admission_db
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      # Mount thư mục init.sql để tự động tạo Tables và Extension khi chạy lần đầu
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ufm_admin -d ufm_admission_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================================
  # PGADMIN 4 (Giao diện Quản trị Database) - Tùy chọn
  # Truy cập: http://localhost:5050
  # ==========================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ufm_pgadmin
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@ufm.edu.vn
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      postgres_vector:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  pgvector_data:
  pgadmin_data:
