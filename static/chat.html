<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UFM Tư Vấn Tuyển Sinh — Demo Chat</title>
  <meta name="description" content="Demo chatbot tư vấn tuyển sinh Đại học Tài chính - Marketing (UFM)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b0d14;
      --surface: #12151f;
      --surface-2: #1a1e2e;
      --surface-3: #222840;
      --border: #262d44;
      --primary: #6c5ce7;
      --primary-glow: rgba(108,92,231,.25);
      --accent: #00cec9;
      --accent-glow: rgba(0,206,201,.2);
      --danger: #ff6b6b;
      --success: #51cf66;
      --warn: #fcc419;
      --text: #e8ecf4;
      --text-dim: #7b8399;
      --text-muted: #4a5270;
      --user-bg: linear-gradient(135deg, #6c5ce7 0%, #a855f7 100%);
      --bot-bg: #181c2e;
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex; flex-direction: column;
    }

    /* ── HEADER ── */
    .chat-header {
      background: linear-gradient(135deg, var(--surface) 0%, #1e1340 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex; align-items: center; gap: 14px;
      flex-shrink: 0;
      z-index: 10;
    }
    .chat-header .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--user-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      box-shadow: 0 0 20px var(--primary-glow);
    }
    .chat-header .info h1 {
      font-size: 16px; font-weight: 700;
      background: linear-gradient(90deg, #e8ecf4, #a78bfa);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .chat-header .info p {
      font-size: 11px; color: var(--text-dim); margin-top: 2px;
    }
    .chat-header .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(81,207,102,.5); }
      50% { opacity: .7; box-shadow: 0 0 0 6px rgba(81,207,102,0); }
    }

    /* ── MESSAGES AREA ── */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 24px 16px;
      display: flex; flex-direction: column; gap: 6px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 5px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── MESSAGE BUBBLE ── */
    .msg { display: flex; gap: 10px; max-width: 85%; animation: msgIn .3s ease; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot { align-self: flex-start; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: none; }
    }

    .msg .bubble {
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 14px; line-height: 1.65;
      word-break: break-word;
      position: relative;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 20px var(--primary-glow);
    }
    .msg.bot .bubble {
      background: var(--bot-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg .bot-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #1a1e2e, #2d1b69);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      border: 1px solid var(--border);
    }

    /* ── METADATA CHIP ── */
    .msg-meta {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin-top: 10px; padding-top: 8px;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 6px;
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .3px;
    }
    .chip.intent { background: rgba(108,92,231,.15); color: #a78bfa; }
    .chip.source { background: rgba(0,206,201,.12); color: var(--accent); }
    .chip.time { background: rgba(255,255,255,.05); color: var(--text-dim); }
    .chip.blocked { background: rgba(255,107,107,.15); color: var(--danger); }

    /* ── MARKDOWN IN BOT RESPONSE ── */
    .bubble h1, .bubble h2, .bubble h3 {
      font-weight: 700; margin: 12px 0 6px;
    }
    .bubble h1 { font-size: 16px; }
    .bubble h2 { font-size: 15px; }
    .bubble h3 { font-size: 14px; color: var(--accent); }

    .bubble strong, .bubble b { color: #c4b5fd; font-weight: 600; }
    .bubble em, .bubble i { color: var(--accent); font-style: italic; }

    .bubble ul, .bubble ol {
      margin: 8px 0; padding-left: 22px;
    }
    .bubble li { margin-bottom: 4px; }
    .bubble li::marker { color: var(--primary); }

    .bubble a {
      color: var(--accent); text-decoration: none;
      border-bottom: 1px dotted rgba(0,206,201,.4);
      transition: all .2s;
    }
    .bubble a:hover { color: #38d9a9; border-bottom-color: #38d9a9; }

    .bubble code {
      background: rgba(108,92,231,.15); color: #c4b5fd;
      padding: 2px 6px; border-radius: 4px;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
    }
    .bubble pre {
      background: #0f111a; border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 16px;
      overflow-x: auto; margin: 10px 0;
    }
    .bubble pre code {
      background: none; padding: 0; font-size: 12px; color: var(--text);
    }
    .bubble blockquote {
      border-left: 3px solid var(--primary);
      padding: 8px 14px; margin: 10px 0;
      background: rgba(108,92,231,.06);
      border-radius: 0 8px 8px 0;
      color: var(--text-dim); font-style: italic;
    }
    .bubble hr {
      border: none; border-top: 1px solid var(--border);
      margin: 12px 0;
    }
    .bubble table {
      width: 100%; border-collapse: collapse; margin: 10px 0;
      font-size: 13px;
    }
    .bubble th, .bubble td {
      padding: 8px 12px; border: 1px solid var(--border); text-align: left;
    }
    .bubble th { background: var(--surface-3); font-weight: 600; color: var(--accent); }
    .bubble tr:nth-child(even) td { background: rgba(255,255,255,.02); }

    /* ── TYPING INDICATOR ── */
    .typing { display: flex; gap: 10px; align-self: flex-start; animation: msgIn .3s ease; }
    .typing .bot-avatar { width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #1a1e2e, #2d1b69);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; border: 1px solid var(--border); flex-shrink: 0; }
    .typing .dots {
      display: flex; align-items: center; gap: 5px;
      padding: 14px 20px; background: var(--bot-bg);
      border: 1px solid var(--border); border-radius: var(--radius);
      border-bottom-left-radius: 4px;
    }
    .typing .dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim);
      animation: bounce 1.4s infinite;
    }
    .typing .dot:nth-child(2) { animation-delay: .2s; }
    .typing .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .4; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    /* ── INPUT AREA ── */
    .chat-input-area {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      flex-shrink: 0;
    }
    .input-wrapper {
      display: flex; align-items: flex-end; gap: 10px;
      max-width: 900px; margin: 0 auto;
    }
    .input-wrapper textarea {
      flex: 1; resize: none;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text); font-family: inherit; font-size: 14px;
      line-height: 1.5;
      max-height: 120px; min-height: 44px;
      transition: border-color .2s;
      outline: none;
    }
    .input-wrapper textarea:focus { border-color: var(--primary); }
    .input-wrapper textarea::placeholder { color: var(--text-muted); }
    .char-count {
      font-size: 10px; color: var(--text-muted); text-align: right;
      margin-top: 4px;
    }
    .char-count.warn { color: var(--warn); }
    .char-count.danger { color: var(--danger); }

    .send-btn {
      width: 44px; height: 44px; border: none; border-radius: 50%;
      background: var(--user-bg);
      color: #fff; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; flex-shrink: 0;
      box-shadow: 0 4px 16px var(--primary-glow);
    }
    .send-btn:hover { transform: scale(1.08); box-shadow: 0 6px 24px var(--primary-glow); }
    .send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
    .send-btn .spinner {
      width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── WELCOME ── */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; flex: 1; text-align: center;
      padding: 40px; animation: msgIn .5s ease;
    }
    .welcome .logo { font-size: 56px; margin-bottom: 16px; }
    .welcome h2 {
      font-size: 22px; font-weight: 700;
      background: linear-gradient(90deg, #e8ecf4, #a78bfa);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .welcome p { color: var(--text-dim); font-size: 13px; margin-top: 8px; max-width: 400px; }
    .welcome .suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-top: 24px;
    }
    .welcome .sug-btn {
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 16px; border-radius: 20px;
      font-size: 13px; cursor: pointer; font-family: inherit;
      transition: all .2s;
    }
    .welcome .sug-btn:hover {
      border-color: var(--primary); background: rgba(108,92,231,.1);
      transform: translateY(-1px);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .msg { max-width: 92%; }
      .chat-header { padding: 12px 16px; }
      .chat-input-area { padding: 12px 14px; }
    }
  </style>
</head>
<body>

<!-- ═══════════ HEADER ═══════════ -->
<div class="chat-header">
  <div class="avatar">🎓</div>
  <div class="info">
    <h1>UFM Tư Vấn Tuyển Sinh</h1>
    <p style="display:flex;align-items:center;gap:6px;">
      <span class="status-dot"></span> Trợ lý AI đang sẵn sàng
    </p>
  </div>
</div>

<!-- ═══════════ MESSAGES ═══════════ -->
<div class="chat-messages" id="chatMessages">
  <div class="welcome" id="welcomeScreen">
    <div class="logo">🎓</div>
    <h2>Chào bạn! Mình là Trợ lý Tuyển sinh UFM</h2>
    <p>Mình có thể giúp bạn tìm hiểu về ngành học, học phí, điều kiện xét tuyển, và mọi thông tin về Đại học Tài chính - Marketing.</p>
    <div class="suggestions">
      <button class="sug-btn" onclick="sendSuggestion(this)">📚 Học phí ngành Marketing?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">🎯 Điểm chuẩn 2026?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">🏠 Có ký túc xá không?</button>
      <button class="sug-btn" onclick="sendSuggestion(this)">📋 Thủ tục nhập học?</button>
    </div>
  </div>
</div>

<!-- ═══════════ INPUT ═══════════ -->
<div class="chat-input-area">
  <div class="input-wrapper">
    <div style="flex:1;">
      <textarea id="chatInput" rows="1"
        placeholder="Nhập câu hỏi về tuyển sinh UFM..."
        maxlength="3000"
        oninput="autoResize(this); updateCharCount();"
      ></textarea>
      <div class="char-count" id="charCount"></div>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Gửi">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const API_URL = '/api/v1/chat/message';
let chatHistory = [];
let isLoading = false;
const SESSION_ID = 'demo-' + Math.random().toString(36).substring(2, 10);

// ═══════════════════════════════════════════════════════════
// MARKDOWN RENDERER (Regex-based, no external lib)
// ═══════════════════════════════════════════════════════════
function renderMarkdown(text) {
  if (!text) return '';

  let html = text;

  // ── Escape HTML entities (trước khi parse markdown) ──
  html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // ── Code blocks (``` ... ```) — phải parse trước để bảo vệ nội dung bên trong ──
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`;
  });

  // ── Inline code (`...`) ──
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // ── Headers (### → h3, ## → h2, # → h1) ──
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // ── Bold + Italic (***text*** hoặc ___text___) ──
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');

  // ── Bold (**text** hoặc __text__) ──
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');

  // ── Italic (*text* hoặc _text_) — chú ý không khớp với ** ──
  html = html.replace(/(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)/g, '<em>$1</em>');
  html = html.replace(/(?<!_)_(?!_)(.+?)(?<!_)_(?!_)/g, '<em>$1</em>');

  // ── Blockquote (> text) ──
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // ── Horizontal rule (--- hoặc ***) ──
  html = html.replace(/^(---|\*\*\*|___)$/gm, '<hr>');

  // ── Links [text](url) ──
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // ── Tables ──
  html = html.replace(/^(\|.+\|)\n(\|[\s\-:|]+\|)\n((?:\|.+\|\n?)+)/gm, (match, headerRow, sepRow, bodyRows) => {
    const headers = headerRow.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const rows = bodyRows.trim().split('\n').map(row => {
      const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<table><thead><tr>${headers}</tr></thead><tbody>${rows}</tbody></table>`;
  });

  // ── Unordered lists (- item hoặc * item) ──
  html = html.replace(/^(\s*)[*\-] (.+)$/gm, '<li>$2</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');

  // ── Ordered lists (1. item) ──
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Gộp liên tiếp <li> thành <ol> (khi chưa bọc)
  html = html.replace(/(?<!<\/ul>)((?:<li>.*<\/li>\n?){2,})/g, (match) => {
    // Chỉ bọc nếu chưa thuộc <ul>
    if (match.includes('<ul>')) return match;
    return `<ol>${match}</ol>`;
  });

  // ── Paragraphs (2 xuống dòng → <br><br>, 1 xuống dòng → <br>) ──
  html = html.replace(/\n\n/g, '<br><br>');
  html = html.replace(/\n/g, '<br>');

  // ── Clean up ──
  html = html.replace(/<br><\/ul>/g, '</ul>');
  html = html.replace(/<br><\/ol>/g, '</ol>');
  html = html.replace(/<ul><br>/g, '<ul>');
  html = html.replace(/<ol><br>/g, '<ol>');
  html = html.replace(/<br>(<h[1-3]>)/g, '$1');
  html = html.replace(/(<\/h[1-3]>)<br>/g, '$1');
  html = html.replace(/<br>(<table>)/g, '$1');
  html = html.replace(/(<\/table>)<br>/g, '$1');
  html = html.replace(/<br>(<pre>)/g, '$1');
  html = html.replace(/(<\/pre>)<br>/g, '$1');
  html = html.replace(/<br>(<blockquote>)/g, '$1');
  html = html.replace(/(<\/blockquote>)<br>/g, '$1');
  html = html.replace(/<br>(<hr>)/g, '$1');
  html = html.replace(/(<hr>)<br>/g, '$1');

  return html;
}

// ═══════════════════════════════════════════════════════════
// SEND MESSAGE
// ═══════════════════════════════════════════════════════════
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const query = input.value.trim();
  if (!query || isLoading) return;

  // Ẩn welcome nếu còn hiện
  const welcome = document.getElementById('welcomeScreen');
  if (welcome) welcome.remove();

  // Append user message
  appendMessage('user', query);
  chatHistory.push({ role: 'user', content: query });

  // Clear input
  input.value = '';
  input.style.height = 'auto';
  updateCharCount();

  // Show typing
  isLoading = true;
  updateSendButton();
  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        query: query,
        chat_history: chatHistory.slice(-20),
        session_id: SESSION_ID,
      }),
    });

    hideTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `Lỗi ${res.status}`);
    }

    const data = await res.json();

    appendMessage('bot', data.response, {
      intent: data.intent,
      source: data.source,
      elapsed: data.elapsed_seconds,
      blocked: data.blocked,
    });

    chatHistory.push({ role: 'assistant', content: data.response });

  } catch (e) {
    hideTyping();
    appendMessage('bot', `⚠️ Xin lỗi, đã có lỗi xảy ra: ${e.message}`, {
      source: 'error',
    });
  } finally {
    isLoading = false;
    updateSendButton();
  }
}

function sendSuggestion(btn) {
  const input = document.getElementById('chatInput');
  // Lấy text thuần, bỏ emoji đầu
  input.value = btn.textContent.replace(/^[\s\p{Emoji_Presentation}\p{Extended_Pictographic}]+/u, '').trim();
  sendMessage();
}

// ═══════════════════════════════════════════════════════════
// DOM HELPERS
// ═══════════════════════════════════════════════════════════
function appendMessage(role, content, meta = {}) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (role === 'user') {
    div.innerHTML = `<div class="bubble">${escapeHtml(content)}</div>`;
  } else {
    let metaHtml = '';
    if (meta.intent || meta.source || meta.elapsed !== undefined) {
      metaHtml = '<div class="msg-meta">';
      if (meta.blocked) metaHtml += `<span class="chip blocked">🚫 Blocked</span>`;
      if (meta.intent && meta.intent !== 'BLOCKED') metaHtml += `<span class="chip intent">🧭 ${meta.intent}</span>`;
      if (meta.source) metaHtml += `<span class="chip source">📡 ${meta.source}</span>`;
      if (meta.elapsed !== undefined) metaHtml += `<span class="chip time">⏱ ${meta.elapsed.toFixed(2)}s</span>`;
      metaHtml += '</div>';
    }

    div.innerHTML = `
      <div class="bot-avatar">🎓</div>
      <div class="bubble">
        ${renderMarkdown(content)}
        ${metaHtml}
      </div>
    `;
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="bot-avatar">🎓</div>
    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function updateSendButton() {
  const btn = document.getElementById('sendBtn');
  if (isLoading) {
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div>';
  } else {
    btn.disabled = false;
    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"></line>
      <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
    </svg>`;
  }
}

function escapeHtml(text) {
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function updateCharCount() {
  const input = document.getElementById('chatInput');
  const counter = document.getElementById('charCount');
  const len = input.value.length;
  const max = 3000;

  if (len === 0) {
    counter.textContent = '';
    counter.className = 'char-count';
  } else {
    counter.textContent = `${len} / ${max}`;
    if (len > max * 0.9) counter.className = 'char-count danger';
    else if (len > max * 0.7) counter.className = 'char-count warn';
    else counter.className = 'char-count';
  }
}

// ── Enter to send (Shift+Enter = new line) ──
document.getElementById('chatInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── Focus input on load ──
document.getElementById('chatInput').focus();
</script>
</body>
</html>
